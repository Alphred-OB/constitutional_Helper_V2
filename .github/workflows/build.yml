# GitHub Actions Workflow - Build Windows Executable
# This automatically builds the .exe when you push to GitHub
# Artifact is available for download in GitHub Actions tab

name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app.py'
      - 'config.py'
      - 'rag.py'
      - 'requirements.txt'
      - 'build_exe.spec'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build executable
      run: python build.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ConstitutionalHelper-exe
        path: dist/ConstitutionalHelper/
        retention-days: 30
